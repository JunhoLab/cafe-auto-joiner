name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean CafeAutoJoiner.spec

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CafeAutoJoiner/* -DestinationPath dist/CafeAutoJoiner-windows.zip -CompressionLevel Optimal -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CafeAutoJoiner-windows
          path: dist/CafeAutoJoiner-windows.zip
          compression-level: 0
          if-no-files-found: error
